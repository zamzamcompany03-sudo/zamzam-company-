<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زمزم للمجوهرات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', 'Poppins', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        .header {
            background-color: #0a0a0a;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #D4AF37;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            color: #D4AF37;
            text-align: center;
            flex: 1;
        }

        .header-icon {
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* ===== PRICE BOX ===== */
        .price-box {
            background-color: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .price-box h2 {
            font-size: 14px;
            color: #B8860B;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .price-box .price {
            font-size: 36px;
            color: #D4AF37;
            font-weight: bold;
        }

        .price-change {
            font-size: 14px;
            color: #4CAF50;
            margin-top: 10px;
        }

        /* ===== CHART ===== */
        .chart-container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            height: 250px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
        }

        .chart-bar {
            background: linear-gradient(to top, #D4AF37, #FFD700);
            width: 8%;
            border-radius: 5px 5px 0 0;
            min-height: 20px;
        }

        .chart-date {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #888;
            width: 100%;
            text-align: center;
        }

        /* ===== CARDS ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .card.gold-section {
            border: 2px solid #D4AF37;
        }

        .card h3 {
            font-size: 16px;
            color: #D4AF37;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .card .value {
            font-size: 28px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card .unit {
            font-size: 12px;
            color: #999;
        }

        /* ===== BUTTON ===== */
        .btn {
            background-color: #D4AF37;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: #FFD700;
            transform: translateY(-2px);
        }

        /* ===== SECTIONS ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .section-header h2 {
            font-size: 18px;
            color: #D4AF37;
        }

        .section-header .badge {
            background-color: #D4AF37;
            color: #0a0a0a;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        /* ===== PRODUCTS ===== */
        .product {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .product-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .product h3 {
            color: #D4AF37;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .product p {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 22px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-discount {
            background-color: #FFD700;
            color: #0a0a0a;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #0a0a0a;
            border-top: 1px solid #D4AF37;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 200;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #999;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: #D4AF37;
        }

        .nav-item:hover {
            color: #D4AF37;
        }

        .nav-item-icon {
            font-size: 24px;
        }

        .nav-item-text {
            font-size: 12px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #D4AF37;
        }

        .modal h2 {
            color: #D4AF37;
            margin-bottom: 15px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #D4AF37;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
            background-color: #1a1a1a;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .header h1 {
                font-size: 20px;
            }

            .container {
                padding: 15px;
            }

            .price-box .price {
                font-size: 28px;
            }

            .card .value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-icon" onclick="openModal('share')">📤</div>
        <h1>🏆 زمزم</h1>
        <div class="header-icon" onclick="openModal('settings')">⚙️</div>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="container">
        <!-- السوق الرئيسي -->
        <div id="marketView">
            <!-- سعر الذهب -->
            <div class="price-box">
                <h2>سعر الذهب العالمي (الأونصة)</h2>
                <div class="price" id="goldPrice">$4,323.7</div>
                <div class="price-change">
                    <span id="priceChange">↑ 50,852</span>
                    <span id="pricePercent">(5.7%)</span>
                </div>
            </div>

            <!-- الأقسام الرئيسية -->
            <div class="cards-grid">
                <div class="card gold-section" onclick="loadSection('gold')">
                    <h3>🥇 الذهب (عيار 21)</h3>
                    <div class="value" id="goldCount">3</div>
                    <div class="unit">منتجات</div>
                </div>
                <div class="card" onclick="loadSection('watches')">
                    <h3>⌚ الساعات والفضيات</h3>
                    <div class="value" id="watchCount">3</div>
                    <div class="unit">منتجات</div>
                </div>
            </div>

            <!-- منتجات الذهب -->
            <div id="goldProducts"></div>

            <!-- منتجات الساعات -->
            <div id="watchProducts"></div>

            <!-- أسعار الذهب -->
            <div style="margin-top: 30px; text-align: center;">
                <button class="btn" onclick="loadPrices()">📊 أسعار الذهب المحدثة</button>
            </div>
        </div>
    </div>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="loadMarket()">
            <div class="nav-item-icon">📈</div>
            <div class="nav-item-text">السوق</div>
        </div>
        <div class="nav-item" onclick="loadCalculator()">
            <div class="nav-item-icon">🧮</div>
            <div class="nav-item-text">الحاسبات</div>
        </div>
        <div class="nav-item" onclick="openAdminPanel()">
            <div class="nav-item-icon">⚙️</div>
            <div class="nav-item-text">الإعدادات</div>
        </div>
    </div>

    <!-- ===== MODALS ===== -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal('settings')">✕</div>
            <h2>الإعدادات</h2>
            <div class="form-group">
                <label>البريد الإلكتروني:</label>
                <input type="email" id="adminEmail" placeholder="your@email.com">
            </div>
            <button class="btn" onclick="loginAdmin()">تسجيل الدخول</button>
        </div>
    </div>

    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal('share')">✕</div>
            <h2>مشاركة</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn" onclick="shareToWhatsApp()">WhatsApp</button>
                <button class="btn" onclick="shareToInstagram()">Instagram</button>
                <button class="btn" onclick="shareToFacebook()">Facebook</button>
                <button class="btn" onclick="shareToTikTok()">TikTok</button>
            </div>
        </div>
    </div>

    <!-- ===== FIREBASE ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDaoYP--jTj3V3eNhI4jU6roMB1XQ_4490",
            authDomain: "zamzam-company.firebaseapp.com",
            databaseURL: "https://zamzam-company-default-rtdb.firebaseio.com",
            projectId: "zamzam-company",
            storageBucket: "zamzam-company.firebasestorage.app",
            messagingSenderId: "559764163886",
            appId: "1:559764163886:web:cb441430ff69c888b57ebf",
            measurementId: "G-68WHR4LN15"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ===== LOAD PRODUCTS =====
        function loadMarket() {
            document.querySelector('.nav-item:nth-child(1)').classList.add('active');
            document.querySelector('.nav-item:nth-child(2)').classList.remove('active');
            document.querySelector('.nav-item:nth-child(3)').classList.remove('active');

            loadGoldProducts();
            loadWatchProducts();
        }

        function loadGoldProducts() {
            database.ref('zamzam-company/gold/products').on('value', (snapshot) => {
                const data = snapshot.val();
                let html = '<div class="section-header"><h2>🥇 الذهب (عيار 21)</h2><div class="badge">21K</div></div><div style="display: grid; gap: 15px;">';
                
                if (data) {
                    Object.keys(data).forEach(key => {
                        const product = data[key];
                        html += `
                            <div class="product">
                                <div class="product-icon">${product.icon || '💎'}</div>
                                <h3>${product.name}</h3>
                                <p>${product.description}</p>
                                <div class="product-price">${product.totalAmount?.toLocaleString() || 0} د.ع</div>
                                <div class="product-discount">خصم ${product.discountPercent}% - ${product.discountDays} أيام</div>
                                <button class="btn" onclick="contactWhatsApp('${product.name}', '${product.totalAmount}')">📱 طلب الآن</button>
                            </div>
                        `;
                    });
                }
                html += '</div>';
                document.getElementById('goldProducts').innerHTML = html;
            });
        }

        function loadWatchProducts() {
            database.ref('zamzam-company/watches_silver/products').on('value', (snapshot) => {
                const data = snapshot.val();
                let html = '<div class="section-header"><h2>⌚ الساعات والفضيات</h2></div><div style="display: grid; gap: 15px;">';
                
                if (data) {
                    Object.keys(data).forEach(key => {
                        const product = data[key];
                        html += `
                            <div class="product">
                                <div class="product-icon">${product.icon || '⌚'}</div>
                                <h3>${product.name}</h3>
                                <p>${product.description}</p>
                                <div class="product-price">${product.totalAmount?.toLocaleString() || 0} د.ع</div>
                                <div class="product-discount">خصم ${product.discountPercent}% - ${product.discountDays} أيام</div>
                                <button class="btn" onclick="contactWhatsApp('${product.name}', '${product.totalAmount}')">📱 طلب الآن</button>
                            </div>
                        `;
                    });
                }
                html += '</div>';
                document.getElementById('watchProducts').innerHTML = html;
            });
        }

        // ===== CONTACT FUNCTIONS =====
        function contactWhatsApp(productName, price) {
            const message = `مرحباً، أنا مهتم بـ: ${productName} - السعر: ${price} د.ع`;
            const phone = "+9647901196926";
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
        }

        function shareToWhatsApp() {
            const text = "تفضل زمزم للمجوهرات الفاخرة 👑";
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        function shareToInstagram() {
            window.open("https://www.instagram.com/zamzm_gold");
        }

        function shareToFacebook() {
            window.open("https://www.facebook.com/share/178dN4REVk/");
        }

        function shareToTikTok() {
            window.open("https://www.tiktok.com/@zamzam_gold");
        }

        // ===== MODAL FUNCTIONS =====
        function openModal(type) {
            document.getElementById(type + 'Modal').classList.add('active');
        }

        function closeModal(type) {
            document.getElementById(type + 'Modal').classList.remove('active');
        }

        function loginAdmin() {
            const email = document.getElementById('adminEmail').value;
            window.location.href = 'admin.html';
        }

        function openAdminPanel() {
            window.location.href = 'admin.html';
        }

        function loadCalculator() {
            alert('🧮 حاسبة الذهب\nقريباً...');
        }

        function loadPrices() {
            window.open('prices.html');
        }

        // ===== INIT =====
        window.addEventListener('load', () => {
            loadMarket();
        });
    </script>
</body>
</html>
