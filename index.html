<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زمزم للمجوهرات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .price-box {
            background-color: #1a1a1a;
            border: 2px solid #D4AF37;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .price-box h2 {
            font-size: 14px;
            color: #B8860B;
            margin-bottom: 15px;
            font-weight: normal;
        }
        .price {
            font-size: 42px;
            color: #D4AF37;
            font-weight: bold;
        }
        .price-change {
            font-size: 14px;
            color: #4CAF50;
            margin-top: 10px;
        }
        .update-time {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="price-box">
        <h2>سعر الذهب العالمي (الأونصة)</h2>
        <div class="price" id="goldPrice">$4168.38</div>
        <div class="price-change">
            <span id="priceChange">↓ $0.74</span>
            <span id="pricePercent" style="color: rgb(255, 107, 107);">(-0.02%)</span>
        </div>
        <div class="update-time" id="updateTime">آخر تحديث: ١١:٤٩:٣٢ ص</div>
    </div>

    <script>
        const WORKER_URL = 'https://zamzam-company.saadzamzamcompany.workers.dev';

        async function fetchGoldPrice() {
            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();
                if (data && data.success && data.price) {
                    const goldPrice = parseFloat(data.price);
                    const lastPrice = parseFloat(localStorage.getItem('lastGoldPrice') || goldPrice);
                    const change = (goldPrice - lastPrice).toFixed(2);
                    const changePercent = ((change / lastPrice) * 100).toFixed(2);

                    document.getElementById('goldPrice').textContent = `$${goldPrice.toFixed(2)}`;
                    document.getElementById('priceChange').textContent = `${change > 0 ? '↑' : '↓'} $${Math.abs(change)}`;
                    document.getElementById('pricePercent').textContent = `(${changePercent}%)`;
                    document.getElementById('pricePercent').style.color = change > 0 ? '#4CAF50' : '#ff6b6b';
                    document.getElementById('updateTime').textContent = `آخر تحديث: ${new Date().toLocaleTimeString('ar-IQ')}`;
                    localStorage.setItem('lastGoldPrice', goldPrice);
                }
            } catch (e) {
                document.getElementById('updateTime').textContent = 'خطأ في جلب السعر';
            }
        }

        fetchGoldPrice();
        setInterval(fetchGoldPrice, 10000);
    </script>


</body></html>
